<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="totem / research — final brand lockup">
  <rect width="800" height="320" fill="#000000"/>

  <!-- ─── Bars mark (scaled 1.8× from 32×32 base, vertically centered) ───
       Original: 4 bars w=26/18/26/12, h=4, gap=3, total h=25, top=3.5
       Scaled 1.8: w=46.8/32.4/46.8/21.6, h=7.2, gap=5.4, total h=45, top=6.3 -->
  <g fill="#ffffff" transform="translate(190, 137)">
    <rect x="0"     y="0"      width="46.8" height="7.2" rx="2.7"/>
    <rect x="7.2"   y="12.6"   width="32.4" height="7.2" rx="2.7"/>
    <rect x="0"     y="25.2"   width="46.8" height="7.2" rx="2.7"/>
    <rect x="12.6"  y="37.8"   width="21.6" height="7.2" rx="2.7"/>
  </g>

  <!-- ─── Wordmark + slash + research, baseline-aligned at y=183. ─── -->
  <text x="252" y="183"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="500" font-size="56" letter-spacing="-2.2"
        fill="#ffffff">totem</text>

  <text x="400" y="183"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="300" font-size="56"
        fill="rgba(255,255,255,0.48)">/</text>

  <text x="425" y="183"
        font-family="'SF Pro Display','Helvetica Neue',Helvetica,Arial,sans-serif"
        font-weight="400" font-size="24" letter-spacing="-0.4"
        fill="rgba(255,255,255,0.48)">research</text>
